name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preflight:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install fintools
        run: uv pip install --no-compile --python python -e .

      - name: Install PyBondLab
        working-directory: packages/PyBondLab
        run: uv pip install --no-compile --python python -e ".[performance]"

      - name: Run release preflight
        run: python tools/release_preflight.py --strict

      - name: Run onboarding smoke test
        run: python tools/onboarding_smoke_test.py

      - name: Install test and build tooling
        run: uv pip install --python python build pytest ruff

      - name: Build fintools artifacts
        run: python -m build --sdist --wheel

      - name: Build PyBondLab artifacts
        working-directory: packages/PyBondLab
        run: python -m build --sdist --wheel

      - name: Lint with ruff
        run: python -m ruff check .

      - name: Run tests
        env:
          PYTHONPATH: packages/PyBondLab
        run: python -B -m pytest tests/ -v -p no:cacheprovider
